<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>콘택트렌즈 시뮬레이터</title>
<style>
:root{
  --bg:#06111f; --panel:rgba(9,20,40,.84); --panel2:rgba(255,255,255,.04); --line:rgba(255,255,255,.09);
  --text:#eef5ff; --muted:#a9b9d1; --blue:#4ea6ff; --blue2:#8fd2ff; --radius:18px; --shadow:0 18px 45px rgba(0,0,0,.34);
}
*{box-sizing:border-box}
body{margin:0;font-family:Inter,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;color:var(--text);background:radial-gradient(circle at top,#12325e 0%,#08162d 35%,var(--bg) 72%)}
.app{max-width:1520px;margin:0 auto;padding:18px}
.shell{display:grid;grid-template-columns:340px 1fr;gap:18px;align-items:start}
.panel{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);backdrop-filter:blur(16px)}
.sidebar{padding:18px;display:flex;flex-direction:column;gap:16px;position:sticky;top:16px}
.viewer{padding:14px;display:flex;flex-direction:column;gap:12px}
.kicker{font-size:11px;font-weight:800;letter-spacing:.15em;text-transform:uppercase;color:var(--blue2)}
h1{margin:0;font-size:28px;line-height:1.1}
.section{display:flex;flex-direction:column;gap:10px;background:linear-gradient(180deg,rgba(255,255,255,.02),rgba(255,255,255,.01));border:1px solid var(--line);border-radius:16px;padding:14px}
.section h3{margin:0;font-size:15px}
.muted{font-size:12px;color:var(--muted)}
.grid-chip{display:flex;flex-wrap:wrap;gap:10px}
.chip{border:1px solid var(--line);background:rgba(255,255,255,.02);color:var(--text);padding:10px 18px;border-radius:16px;font-size:14px;font-weight:700;cursor:pointer;transition:.18s}
.chip.active{border-color:rgba(78,166,255,.9);box-shadow:inset 0 0 0 1px rgba(78,166,255,.55);background:rgba(78,166,255,.11)}
.slider-list{display:flex;flex-direction:column;gap:12px}
.slider-row{padding:10px 12px;border:1px solid var(--line);border-radius:14px;background:var(--panel2)}
.slider-head{display:flex;justify-content:space-between;gap:10px;font-size:14px;font-weight:700;margin-bottom:8px}
input[type=range]{width:100%}
.select-wrap{display:flex;flex-direction:column;gap:12px}
.field{display:flex;flex-direction:column;gap:6px}
.field label{font-size:13px;font-weight:700}
select{width:100%;height:46px;border-radius:14px;border:1px solid rgba(78,166,255,.45);background:#0a1730;color:var(--text);padding:0 14px;font-size:15px}
.toolbar{display:flex;justify-content:space-between;gap:10px;align-items:center;flex-wrap:wrap}
.toolbar-left,.toolbar-right{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.badge{display:inline-flex;align-items:center;gap:8px;padding:11px 16px;border-radius:999px;border:1px solid var(--line);background:rgba(255,255,255,.02);font-size:14px}
.ghost-btn{border:1px solid var(--line);background:rgba(255,255,255,.02);color:var(--text);border-radius:14px;padding:10px 14px;font-weight:700;cursor:pointer}
.stage{position:relative;overflow:hidden;border-radius:20px;border:1px solid var(--line);aspect-ratio:16/9;background:#081120}
.compare-pane{position:absolute;inset:0;overflow:hidden}
.compare-pane .stack{position:absolute;inset:0}
.compare-pane video,.compare-pane .ghost,.compare-pane .halo,.compare-pane .presbyopia-mask,.compare-pane .axis-line{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
.compare-pane video.main{filter:var(--filter)}
.compare-pane .ghost{opacity:var(--ghostOpacity);transform:translate(var(--ghostX),var(--ghostY));backdrop-filter:blur(var(--ghostBlur));mix-blend-mode:screen;background:transparent}
.compare-pane .ghost::before{content:"";position:absolute;inset:0;background:inherit;background-image:inherit}
.compare-pane .halo{pointer-events:none;opacity:var(--haloOpacity);background:radial-gradient(circle at 50% 48%, rgba(255,255,255,.35) 0 5%, rgba(255,255,255,.14) 9%, rgba(255,255,255,0) 19%), radial-gradient(circle at 70% 30%, rgba(255,255,255,.20) 0 4%, rgba(255,255,255,0) 17%);filter:blur(var(--haloBlur)) brightness(var(--haloBrightness));mix-blend-mode:screen}
.compare-pane .presbyopia-mask{pointer-events:none;opacity:var(--presbyopiaOpacity);background:radial-gradient(circle at 50% 54%, rgba(255,255,255,0) 0 17%, rgba(7,17,31,0) 24%, rgba(7,17,31,.36) 38%, rgba(7,17,31,.68) 56%, rgba(7,17,31,.90) 74%);backdrop-filter:blur(var(--presbyopiaBlur))}
.compare-pane .axis-line{pointer-events:none;opacity:var(--axisOpacity);background:linear-gradient(var(--axisDeg), transparent 48.9%, rgba(255,255,255,.9) 49.5%, transparent 50.1%);mix-blend-mode:screen}
#leftPane{clip-path:polygon(0 0,var(--split) 0,var(--split) 100%,0 100%)}
#rightPane{clip-path:polygon(var(--split) 0,100% 0,100% 100%,var(--split) 100%)}
.divider{position:absolute;top:0;bottom:0;left:var(--split);width:2px;background:rgba(255,255,255,.78);transform:translateX(-1px);z-index:5}
.handle{position:absolute;top:50%;left:var(--split);transform:translate(-50%,-50%);z-index:6;width:42px;height:42px;border-radius:50%;border:1px solid rgba(255,255,255,.25);background:#fff;color:#1c2433;display:grid;place-items:center;font-size:24px;font-weight:900;cursor:ew-resize;user-select:none}
.side-label{position:absolute;top:18px;padding:10px 14px;border-radius:13px;background:rgba(10,13,20,.72);border:1px solid rgba(255,255,255,.12);z-index:4;font-weight:800}
.side-label.left{left:18px}.side-label.right{right:18px}
.footer-note{font-size:12px;color:#c8d5e6;text-align:center;padding-top:2px}
@media (max-width:1180px){.shell{grid-template-columns:1fr}.sidebar{position:static}.app{padding:12px}}
@media (max-width:760px){h1{font-size:24px}.badge{font-size:12px;padding:9px 12px}.chip{padding:9px 14px;font-size:13px}.handle{width:38px;height:38px}}
</style>
</head>
<body>
<div class="app">
  <div class="shell">
    <aside class="panel sidebar">
      <div>
        <div class="kicker">Vision Simulator v2</div>
        <h1>콘택트렌즈 시뮬레이터</h1>
      </div>

      <div class="section">
        <h3>1단계 | 굴절 이상 선택 (중복 선택 가능)</h3>
        <div class="grid-chip" id="conditionGrid"></div>
      </div>

      <div class="section">
        <h3>2단계 | 증상 강도 조절</h3>
        <div class="slider-list" id="sliderList"></div>
      </div>

      <div class="section">
        <h3>3단계 | 제품 선택 (좌/우 비교)</h3>
        <div class="select-wrap">
          <div class="field">
            <label for="leftProduct">좌측 화면 제품</label>
            <select id="leftProduct"></select>
          </div>
          <div class="field">
            <label for="rightProduct">우측 화면 제품</label>
            <select id="rightProduct"></select>
          </div>
          <div class="muted">None 선택 시 해당 반쪽 화면은 제품 미적용 상태로 보여집니다.</div>
        </div>
      </div>
    </aside>

    <section class="panel viewer">
      <div class="toolbar">
        <div class="toolbar-left">
          <span class="badge" id="conditionBadge">상태 : 정시</span>
          <span class="badge" id="leftBadge">좌측 : None</span>
          <span class="badge" id="rightBadge">우측 : None</span>
          <span class="badge" id="sceneBadge">Scene : Day to Day</span>
        </div>
        <div class="toolbar-right">
          <select id="sceneSelect" style="width:220px;height:44px">
            <option value="day">Day to Day</option>
            <option value="dine">Dine Out</option>
            <option value="night">Night Driving</option>
          </select>
          <button class="ghost-btn" id="resetBtn">초기화</button>
        </div>
      </div>

      <div class="stage" id="stage">
        <div class="compare-pane" id="leftPane">
          <div class="stack" id="leftStack">
            <video class="main" id="leftVideo" autoplay muted loop playsinline crossorigin="anonymous"></video>
            <div class="ghost"></div>
            <div class="halo"></div>
            <div class="presbyopia-mask"></div>
            <div class="axis-line"></div>
          </div>
        </div>
        <div class="compare-pane" id="rightPane">
          <div class="stack" id="rightStack">
            <video class="main" id="rightVideo" autoplay muted loop playsinline crossorigin="anonymous"></video>
            <div class="ghost"></div>
            <div class="halo"></div>
            <div class="presbyopia-mask"></div>
            <div class="axis-line"></div>
          </div>
        </div>
        <div class="side-label left">좌측 화면</div>
        <div class="side-label right">우측 화면</div>
        <div class="divider"></div>
        <div class="handle" id="handle">‹›</div>
      </div>

      <div class="footer-note">* 본 시뮬레이션은 이해를 돕기 위한 예시이며, 실제 착용 시 개인에 따라 차이가 있을 수 있습니다.</div>
    </section>
  </div>
</div>

<script>
const scenes={
  day:{label:'Day to Day',url:'https://assets.contentstack.io/v3/assets/blta38a56f5447b1cc5/bltf0b4b11efcbe4ec4/66a8b2b0a3b12e0a0b5f5d9e/PureseeLens_dayToDay_High.mp4?branch=prod_alias'},
  dine:{label:'Dine Out',url:'https://assets.contentstack.io/v3/assets/blta38a56f5447b1cc5/blta6e961a6e0f6a90f/66a8b2ae90e89afe7d28ffc4/PureseeLens_dineOut_High.mp4?branch=prod_alias'},
  night:{label:'Night Driving',url:'https://assets.contentstack.io/v3/assets/blta38a56f5447b1cc5/blt1b4784f4566a173b/66a8b2b7971644620e9d0df9/PureseeLens_nightDriving_High.mp4?branch=prod_alias'}
};
const conditions=[
  {id:'emmetrope',label:'정시',singleOnly:true},
  {id:'myopia',label:'근시'},
  {id:'hyperopia',label:'원시'},
  {id:'astigmatism',label:'난시'},
  {id:'presbyopia',label:'노안'}
];
const allProducts=[
  {id:'none',name:'None (아무것도 선택 안함)'},
  {id:'oasys',name:'오아시스'},
  {id:'max1day',name:'맥스 원데이'},
  {id:'max',name:'맥스'},
  {id:'moistMulti',name:'모이스트 멀티포컬'},
  {id:'maxMulti',name:'맥스 멀티포컬'},
  {id:'oasysToric',name:'오아시스 난시'},
  {id:'maxToric',name:'맥스 난시'},
  {id:'maxMultiToric',name:'맥스 멀티 난시'}
];

const state={
  selected:['emmetrope'],
  severity:{myopia:55,hyperopia:45,astigmatism:55,presbyopia:50,axis:14},
  scene:'day',
  leftProduct:'none',
  rightProduct:'none',
  split:50
};

const dom={
  conditionGrid:document.getElementById('conditionGrid'), sliderList:document.getElementById('sliderList'),
  leftProduct:document.getElementById('leftProduct'), rightProduct:document.getElementById('rightProduct'),
  sceneSelect:document.getElementById('sceneSelect'), conditionBadge:document.getElementById('conditionBadge'),
  leftBadge:document.getElementById('leftBadge'), rightBadge:document.getElementById('rightBadge'), sceneBadge:document.getElementById('sceneBadge'),
  resetBtn:document.getElementById('resetBtn'), stage:document.getElementById('stage'), handle:document.getElementById('handle'),
  leftVideo:document.getElementById('leftVideo'), rightVideo:document.getElementById('rightVideo'),
  leftStack:document.getElementById('leftStack'), rightStack:document.getElementById('rightStack')
};

function selectedFlags(){
  return {
    emmetrope:state.selected.includes('emmetrope'), myopia:state.selected.includes('myopia'), hyperopia:state.selected.includes('hyperopia'),
    astigmatism:state.selected.includes('astigmatism'), presbyopia:state.selected.includes('presbyopia')
  }
}

function productOptions(){
  const f=selectedFlags();
  let ids=new Set(['none']);
  if(f.myopia||f.hyperopia){ids.add('oasys'); ids.add('max1day');}
  if(f.presbyopia){ids.add('oasys'); ids.add('max'); ids.add('moistMulti'); ids.add('maxMulti');}
  if(f.astigmatism){ids.add('oasysToric'); ids.add('oasys'); ids.add('max'); ids.add('maxToric');}
  if(f.astigmatism&&f.presbyopia){ids.add('maxMultiToric');}
  if(f.emmetrope){ids = new Set(['none']);}
  return allProducts.filter(p=>ids.has(p.id));
}

function renderConditions(){
  dom.conditionGrid.innerHTML='';
  conditions.forEach(c=>{
    const b=document.createElement('button'); b.className='chip'+(state.selected.includes(c.id)?' active':''); b.textContent=c.label;
    b.onclick=()=>toggleCondition(c.id); dom.conditionGrid.appendChild(b);
  });
}
function toggleCondition(id){
  if(id==='emmetrope'){state.selected=['emmetrope'];}
  else {
    state.selected=state.selected.filter(v=>v!=='emmetrope');
    if(state.selected.includes(id)) state.selected=state.selected.filter(v=>v!==id); else state.selected.push(id);
    if(!state.selected.length) state.selected=['emmetrope'];
  }
  syncSelectOptions(); renderAll();
}

function renderSliders(){
  const f=selectedFlags(); const items=[];
  if(f.myopia) items.push(['myopia','근시 강도']);
  if(f.hyperopia) items.push(['hyperopia','원시 강도']);
  if(f.astigmatism) items.push(['astigmatism','난시 강도'],['axis','난시 축']);
  if(f.presbyopia) items.push(['presbyopia','노안 강도']);
  if(!items.length) items.push(['emmetrope','정시 상태']);
  dom.sliderList.innerHTML='';
  items.forEach(([key,label])=>{
    const row=document.createElement('div'); row.className='slider-row';
    if(key==='emmetrope'){row.innerHTML='<div class="muted">정시 상태에서는 추가 증상 강도 조절이 없습니다.</div>'; dom.sliderList.appendChild(row); return;}
    const value=state.severity[key]; const min= key==='axis'?0:0; const max= key==='axis'?30:100;
    row.innerHTML=`<div class="slider-head"><span>${label}</span><span>${value}${key==='axis'?'°':'%'}</span></div><input type="range" min="${min}" max="${max}" value="${value}" step="1">`;
    row.querySelector('input').oninput=e=>{state.severity[key]=Number(e.target.value); applyVisuals(); renderSliders(); updateBadges();};
    dom.sliderList.appendChild(row);
  });
}

function syncSelectOptions(){
  const options=productOptions();
  [dom.leftProduct,dom.rightProduct].forEach((sel,idx)=>{
    const keep= idx===0?state.leftProduct:state.rightProduct;
    sel.innerHTML = options.map(p=>`<option value="${p.id}">${p.name}</option>`).join('');
    if(options.some(p=>p.id===keep)) sel.value=keep; else sel.value='none';
    if(idx===0) state.leftProduct=sel.value; else state.rightProduct=sel.value;
  });
}

function renderProducts(){
  syncSelectOptions();
  dom.leftProduct.onchange=e=>{state.leftProduct=e.target.value; applyVisuals(); updateBadges();};
  dom.rightProduct.onchange=e=>{state.rightProduct=e.target.value; applyVisuals(); updateBadges();};
}

function productById(id){ return allProducts.find(p=>p.id===id) || allProducts[0]; }

function computeEffect(productId){
  const f=selectedFlags();
  let myopia = f.myopia ? state.severity.myopia/100 : 0;
  let hyper = f.hyperopia ? state.severity.hyperopia/100 : 0;
  let asti = f.astigmatism ? state.severity.astigmatism/100 : 0;
  let pres = f.presbyopia ? state.severity.presbyopia/100 : 0;
  const axis = state.severity.axis;

  if(productId==='none' || f.emmetrope){
    // keep raw symptoms
  } else {
    switch(productId){
      case 'oasys': myopia*=0.25; hyper*=0.35; asti*=0.72; pres*=0.75; break;
      case 'max1day': myopia*=0.22; hyper*=0.32; asti*=0.70; pres*=0.78; break;
      case 'max': myopia*=0.28; hyper*=0.30; asti*=0.68; pres*=0.66; break;
      case 'moistMulti': myopia*=0.45; hyper*=0.45; asti*=0.95; pres*=0.25; break;
      case 'maxMulti': myopia*=0.38; hyper*=0.38; asti*=0.90; pres*=0.18; break;
      case 'oasysToric': myopia*=0.28; hyper*=0.35; asti*=0.18; pres*=0.90; break;
      case 'maxToric': myopia*=0.26; hyper*=0.32; asti*=0.14; pres*=0.82; break;
      case 'maxMultiToric': myopia*=0.35; hyper*=0.35; asti*=0.16; pres*=0.20; break;
    }
  }

  let blur = (myopia*10)+(hyper*6)+(pres*3.8)+(asti*2.5);
  let contrast = 1 - (myopia*0.08 + hyper*0.05 + pres*0.03);
  let brightness = 1 - (myopia*0.04 + hyper*0.03);
  let saturate = 1 - (myopia*0.04);
  let ghostOpacity = asti ? Math.min(0.38, asti*0.52) : 0;
  let ghostX = asti ? (8 + asti*18) * Math.cos(axis*Math.PI/180) : 0;
  let ghostY = asti ? (8 + asti*18) * Math.sin(axis*Math.PI/180) : 0;
  let ghostBlur = asti ? (1 + asti*3.2) : 0;
  let haloOpacity = 0, haloBlur = 0, haloBrightness = 1;
  if(state.scene==='night' || productId==='max' || productId==='max1day' || productId==='maxToric' || productId==='maxMulti' || productId==='maxMultiToric'){
    haloOpacity = productId==='none' ? 0.30 : (productId.includes('max') ? 0.08 : 0.18);
    haloBlur = productId==='none' ? 10 : (productId.includes('max') ? 4 : 7);
    haloBrightness = productId==='none' ? 1.12 : (productId.includes('max') ? 1.02 : 1.06);
  }
  const presbyopiaOpacity = pres ? 1 : 0;
  const presbyopiaBlur = 1 + pres*7;
  const axisOpacity = asti ? 0.55 : 0;

  if(productId==='none' && !f.myopia && !f.hyperopia && !f.astigmatism && !f.presbyopia){
    blur=0; contrast=1; brightness=1; saturate=1; ghostOpacity=0; haloOpacity=0; haloBlur=0; haloBrightness=1;
  }

  return {
    filter:`blur(${blur.toFixed(2)}px) contrast(${contrast.toFixed(3)}) brightness(${brightness.toFixed(3)}) saturate(${saturate.toFixed(3)})`,
    ghostOpacity, ghostX:`${ghostX.toFixed(1)}px`, ghostY:`${ghostY.toFixed(1)}px`, ghostBlur:`${ghostBlur.toFixed(2)}px`,
    haloOpacity, haloBlur:`${haloBlur.toFixed(2)}px`, haloBrightness,
    presbyopiaOpacity, presbyopiaBlur:`${presbyopiaBlur.toFixed(2)}px`, axisOpacity, axisDeg:`${axis}deg`
  };
}

function applyStyle(stack,effect){
  stack.style.setProperty('--filter', effect.filter);
  stack.style.setProperty('--ghostOpacity', effect.ghostOpacity);
  stack.style.setProperty('--ghostX', effect.ghostX);
  stack.style.setProperty('--ghostY', effect.ghostY);
  stack.style.setProperty('--ghostBlur', effect.ghostBlur);
  stack.style.setProperty('--haloOpacity', effect.haloOpacity);
  stack.style.setProperty('--haloBlur', effect.haloBlur);
  stack.style.setProperty('--haloBrightness', effect.haloBrightness);
  stack.style.setProperty('--presbyopiaOpacity', effect.presbyopiaOpacity);
  stack.style.setProperty('--presbyopiaBlur', effect.presbyopiaBlur);
  stack.style.setProperty('--axisOpacity', effect.axisOpacity);
  stack.style.setProperty('--axisDeg', effect.axisDeg);
}

function applyVisuals(){
  applyStyle(dom.leftStack, computeEffect(state.leftProduct));
  applyStyle(dom.rightStack, computeEffect(state.rightProduct));
  updateBadges();
}

function updateBadges(){
  const label = conditions.filter(c=>state.selected.includes(c.id)).map(c=>c.label).join(' + ');
  dom.conditionBadge.textContent=`상태 : ${label}`;
  dom.leftBadge.textContent=`좌측 : ${productById(state.leftProduct).name.replace(' (아무것도 선택 안함)','')}`;
  dom.rightBadge.textContent=`우측 : ${productById(state.rightProduct).name.replace(' (아무것도 선택 안함)','')}`;
  dom.sceneBadge.textContent=`Scene : ${scenes[state.scene].label}`;
}

function setScene(key){
  state.scene=key; dom.sceneSelect.value=key;
  const src=scenes[key].url;
  [dom.leftVideo,dom.rightVideo].forEach(v=>{ if(v.src!==src){v.src=src; v.load();} v.play().catch(()=>{}); });
  updateBadges(); applyVisuals();
}

function syncVideos(){
  const a=dom.leftVideo, b=dom.rightVideo;
  if(Math.abs(a.currentTime-b.currentTime)>0.08) b.currentTime=a.currentTime;
  if(a.paused && !b.paused) b.pause();
  if(!a.paused && b.paused) b.play().catch(()=>{});
}

function renderAll(){renderConditions(); renderSliders(); renderProducts(); applyVisuals(); updateBadges();}

// divider drag
function setSplit(percent){ state.split=Math.max(15,Math.min(85,percent)); dom.stage.style.setProperty('--split', state.split+'%'); }
setSplit(50);
let dragging=false;
function moveSplit(clientX){ const rect=dom.stage.getBoundingClientRect(); setSplit(((clientX-rect.left)/rect.width)*100); }
dom.handle.addEventListener('pointerdown',e=>{dragging=true; dom.handle.setPointerCapture(e.pointerId);});
dom.handle.addEventListener('pointermove',e=>{if(dragging) moveSplit(e.clientX);});
dom.handle.addEventListener('pointerup',()=>dragging=false);
dom.stage.addEventListener('pointerdown',e=>{ if(e.target===dom.stage || e.target.classList.contains('divider')) moveSplit(e.clientX); });

// events
dom.sceneSelect.onchange=e=>setScene(e.target.value);
dom.resetBtn.onclick=()=>{ state.selected=['emmetrope']; state.severity={myopia:55,hyperopia:45,astigmatism:55,presbyopia:50,axis:14}; state.leftProduct='none'; state.rightProduct='none'; setSplit(50); syncSelectOptions(); renderAll(); };

dom.leftVideo.addEventListener('loadedmetadata',()=>{ dom.rightVideo.currentTime=dom.leftVideo.currentTime; });
setInterval(syncVideos,500);

renderAll(); setScene('day');
</script>
</body>
</html>
