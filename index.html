<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>콘택트렌즈 시뮬레이터</title>
<style>
:root{
  --bg:#04162f;
  --panel:#0a2348;
  --panel2:#0d2c59;
  --line:rgba(255,255,255,.14);
  --text:#fff;
  --muted:#cfe2ff;
  --blue:#005eb8;
  --blue2:#1987ff;
  --blueSoft:#8ec5ff;
  --radius:20px;
  --shadow:0 18px 44px rgba(0,16,44,.32);
}
*{box-sizing:border-box}
body{
  margin:0;
  font-family:Inter,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;
  color:var(--text);
  background:radial-gradient(circle at top,#0b67c9 0%,#03458e 18%,#06264f 42%,#04162f 70%,#03101f 100%);
}
.app{max-width:1540px;margin:0 auto;padding:18px}
.shell{display:grid;grid-template-columns:360px 1fr;gap:18px;align-items:start}
.panel{
  background:linear-gradient(180deg,rgba(12,38,78,.96),rgba(8,26,53,.98));
  border:1px solid var(--line);
  border-radius:var(--radius);
  box-shadow:var(--shadow);
}
.sidebar{padding:18px;display:flex;flex-direction:column;gap:16px;position:sticky;top:16px}
.viewer{padding:16px;display:flex;flex-direction:column;gap:14px}
.kicker{font-size:11px;font-weight:800;letter-spacing:.18em;text-transform:uppercase;color:var(--blueSoft)}
h1{margin:0;font-size:30px;line-height:1.08}
.section{border:1px solid var(--line);border-radius:18px;padding:14px;background:linear-gradient(180deg,rgba(255,255,255,.03),rgba(255,255,255,.01));display:flex;flex-direction:column;gap:12px}
.section h3{margin:0;font-size:15px}
.grid-chip{display:flex;flex-wrap:wrap;gap:10px}
.chip{
  min-width:92px;padding:11px 16px;border-radius:18px;border:1px solid rgba(255,255,255,.12);background:rgba(255,255,255,.02);color:#fff;
  font-size:14px;font-weight:800;cursor:pointer;transition:.18s;
}
.chip.active{border-color:rgba(155,214,255,.8);box-shadow:inset 0 0 0 1px rgba(255,255,255,.16),0 0 14px rgba(25,135,255,.18);background:linear-gradient(180deg,rgba(0,94,184,.32),rgba(0,94,184,.16))}
.slider-list{display:flex;flex-direction:column;gap:12px}
.slider-row{padding:12px;border:1px solid var(--line);border-radius:16px;background:rgba(255,255,255,.03)}
.slider-head{display:flex;justify-content:space-between;gap:8px;font-size:14px;font-weight:800;margin-bottom:8px}
input[type=range]{width:100%;accent-color:#d7e8ff}
.field{display:flex;flex-direction:column;gap:6px}
.field label{font-size:13px;font-weight:800}
select{
  width:100%;height:50px;border-radius:16px;border:1px solid rgba(144,206,255,.35);
  background:linear-gradient(180deg,#123c76,#0c2d5a);color:#fff;padding:0 14px;font-size:15px;outline:none
}
.muted{font-size:12px;color:var(--muted);line-height:1.5}
.badges{display:flex;gap:10px;flex-wrap:wrap}
.badge{display:inline-flex;align-items:center;padding:10px 16px;border-radius:999px;border:1px solid rgba(255,255,255,.16);background:linear-gradient(180deg,rgba(25,135,255,.16),rgba(255,255,255,.03));font-size:14px}
.topbar{display:flex;justify-content:space-between;gap:10px;align-items:center;flex-wrap:wrap}
.ghost-btn{padding:11px 16px;border-radius:16px;border:1px solid rgba(144,206,255,.34);background:linear-gradient(180deg,#123c76,#0c2d5a);color:#fff;font-weight:800;cursor:pointer}
.rows-wrap{border:1px solid var(--line);border-radius:22px;overflow:hidden;background:rgba(0,0,0,.18)}
.scene-row{display:grid;grid-template-columns:90px 1fr 1fr;min-height:255px;border-top:1px solid rgba(255,255,255,.08)}
.scene-row:first-child{border-top:none}
.scene-side{
  display:flex;flex-direction:column;justify-content:center;align-items:center;gap:10px;
  background:linear-gradient(180deg,rgba(1,10,22,.42),rgba(4,16,33,.18));border-right:1px solid rgba(255,255,255,.08)
}
.scene-side .en{font-size:17px;font-weight:800;line-height:1.1;text-align:center}
.scene-side .ko{font-size:12px;color:#d6e7ff}
.scene-side .icon{font-size:28px;opacity:.95}
.pane{position:relative;overflow:hidden;background:#050d18}
.pane.right{border-left:2px solid rgba(255,255,255,.75)}
.stack,.stack video,.stack .ghost{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
.stack{overflow:hidden}
.stack video.base{filter:var(--baseFilter)}
.stack .near{opacity:var(--nearOpacity);filter:var(--nearFilter)}
.stack .ghost{opacity:var(--ghostOpacity);transform:translate(var(--ghostX),var(--ghostY));filter:blur(var(--ghostBlur));mix-blend-mode:screen}
.row-head{position:absolute;top:12px;left:12px;right:12px;display:flex;justify-content:space-between;align-items:center;z-index:5;pointer-events:none}
.side-pill{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:16px;background:rgba(8,12,18,.68);border:1px solid rgba(255,255,255,.12);backdrop-filter:blur(10px);pointer-events:auto}
.side-tag{font-size:16px;font-weight:900}
.pill-select{height:40px;min-width:170px;border-radius:14px;border:1px solid rgba(255,255,255,.16);background:linear-gradient(180deg,#1681f5,#0d65d4);color:#fff;padding:0 12px;font-weight:800}
.row-center{position:absolute;top:50%;right:-22px;transform:translateY(-50%);z-index:6;width:44px;height:44px;border-radius:50%;background:#fff;color:#1e2532;display:grid;place-items:center;font-size:25px;font-weight:900;box-shadow:0 8px 20px rgba(0,0,0,.25)}
.footer-note{font-size:12px;color:#d8e7ff;text-align:center;padding:10px 0 4px}
/* precise near masks */
.day .near-arm{clip-path:polygon(0 56%, 14% 54%, 29% 52%, 41% 45%, 52% 30%, 66% 21%, 72% 24%, 66% 44%, 47% 69%, 21% 72%, 0 73%)}
.day .near-phone{clip-path:polygon(57% 21%, 70% 21%, 72% 26%, 72% 74%, 69% 79%, 57% 79%, 54% 73%, 54% 27%)}
.day .near-cart{clip-path:polygon(39% 82%, 60% 79%, 78% 82%, 93% 98%, 27% 98%)}
.dine .near-menu{clip-path:polygon(40% 28%, 60% 28%, 63% 33%, 63% 79%, 58% 83%, 42% 83%, 37% 79%, 37% 33%)}
.dine .near-hands{clip-path:polygon(28% 46%, 38% 43%, 41% 72%, 31% 81%, 23% 70%, 23% 53%, 58% 43%, 70% 50%, 73% 68%, 67% 78%, 59% 71%)}
.dine .near-pasta{clip-path:polygon(39% 78%, 56% 76%, 65% 80%, 74% 91%, 29% 92%)}
.night .near-nav{clip-path:polygon(43% 54%, 61% 54%, 62% 80%, 42% 80%)}
.night .near-dash-left{clip-path:polygon(18% 55%, 35% 54%, 35% 79%, 17% 78%)}
.night .near-wheel{clip-path:polygon(0 55%, 17% 49%, 37% 62%, 38% 85%, 0 88%)}
@media (max-width:1180px){.shell{grid-template-columns:1fr}.sidebar{position:static}}
@media (max-width:760px){
  .app{padding:10px}.scene-row{grid-template-columns:72px 1fr 1fr;min-height:190px}.scene-side .en{font-size:13px}.pill-select{min-width:120px;height:36px}.side-tag{font-size:14px}
}
</style>
</head>
<body>
<div class="app">
  <div class="shell">
    <aside class="panel sidebar">
      <div>
        <div class="kicker">ACUVUE Vision Simulator</div>
        <h1>콘택트렌즈 시뮬레이터</h1>
      </div>

      <div class="section">
        <h3>1단계 | 굴절 이상 선택 (중복 선택 가능)</h3>
        <div class="grid-chip" id="conditionGrid"></div>
      </div>

      <div class="section">
        <h3>2단계 | 증상 강도 조절</h3>
        <div class="slider-list" id="sliderList"></div>
      </div>

      <div class="section">
        <h3>3단계 | 제품 선택 (좌/우 비교)</h3>
        <div class="field">
          <label for="leftProduct">좌측 화면 제품</label>
          <select id="leftProduct"></select>
        </div>
        <div class="field">
          <label for="rightProduct">우측 화면 제품</label>
          <select id="rightProduct"></select>
        </div>
        <div class="muted">None 선택 시 해당 화면은 제품 미적용 상태입니다.</div>
      </div>
    </aside>

    <section class="panel viewer">
      <div class="topbar">
        <div class="badges">
          <span class="badge" id="conditionBadge">상태 : 정시</span>
          <span class="badge">좌/우 완전 분리 비교</span>
        </div>
        <button class="ghost-btn" id="resetBtn">초기화</button>
      </div>

      <div class="rows-wrap" id="rowsWrap"></div>
      <div class="footer-note">* 본 시뮬레이션은 이해를 돕기 위한 예시이며, 실제 착용 시 개인에 따라 차이가 있을 수 있습니다.</div>
    </section>
  </div>
</div>
<script>
const scenes=[
  {id:'day', en:'Day to\nDay', ko:'데이', icon:'☼', url:'https://assets.contentstack.io/v3/assets/blta38a56f5447b1cc5/bltf0b4b11efcbe4ec4/66a8b2b0a3b12e0a0b5f5d9e/PureseeLens_dayToDay_High.mp4?branch=prod_alias', className:'day'},
  {id:'dine', en:'Dine\nOut', ko:'다이닝', icon:'🍴', url:'https://assets.contentstack.io/v3/assets/blta38a56f5447b1cc5/blta6e961a6e0f6a90f/66a8b2ae90e89afe7d28ffc4/PureseeLens_dineOut_High.mp4?branch=prod_alias', className:'dine'},
  {id:'night', en:'Night\nDriving', ko:'야간운전', icon:'◐', url:'https://assets.contentstack.io/v3/assets/blta38a56f5447b1cc5/blt1b4784f4566a173b/66a8b2b7971644620e9d0df9/PureseeLens_nightDriving_High.mp4?branch=prod_alias', className:'night'}
];
const conditions=[
  {id:'emmetrope',label:'정시'},
  {id:'myopia',label:'근시'},
  {id:'hyperopia',label:'원시'},
  {id:'astigmatism',label:'난시'},
  {id:'presbyopia',label:'노안'}
];
const allProducts=[
  {id:'none',name:'None (아무것도 선택 안함)'},
  {id:'oasys',name:'오아시스'},
  {id:'max1day',name:'맥스 원데이'},
  {id:'moistMulti',name:'모이스트 멀티포컬'},
  {id:'maxMulti',name:'맥스 멀티포컬'},
  {id:'oasysToric',name:'오아시스 난시'},
  {id:'maxToric',name:'맥스 난시'},
  {id:'maxMultiToric',name:'맥스 멀티 난시'}
];
const state={
  selected:['emmetrope'],
  severity:{myopia:33,hyperopia:0,astigmatism:0,presbyopia:50,axis:14},
  leftProduct:'none', rightProduct:'none'
};
const rowsWrap=document.getElementById('rowsWrap');
const conditionGrid=document.getElementById('conditionGrid');
const sliderList=document.getElementById('sliderList');
const leftProduct=document.getElementById('leftProduct');
const rightProduct=document.getElementById('rightProduct');
const conditionBadge=document.getElementById('conditionBadge');
const resetBtn=document.getElementById('resetBtn');

const refs={};

function selectedFlags(){
  return {
    emmetrope:state.selected.includes('emmetrope'),
    myopia:state.selected.includes('myopia'),
    hyperopia:state.selected.includes('hyperopia'),
    astigmatism:state.selected.includes('astigmatism'),
    presbyopia:state.selected.includes('presbyopia')
  }
}
function productOptions(){
  const f=selectedFlags();
  const ids=new Set(['none']);
  if(f.emmetrope) return allProducts.filter(p=>ids.has(p.id));
  if(f.myopia||f.hyperopia||f.astigmatism||f.presbyopia){ ids.add('oasys'); ids.add('max1day'); }
  if(f.presbyopia){ ids.add('moistMulti'); ids.add('maxMulti'); }
  if(f.astigmatism){ ids.add('oasysToric'); ids.add('maxToric'); }
  if(f.astigmatism&&f.presbyopia){ ids.add('maxMultiToric'); }
  return allProducts.filter(p=>ids.has(p.id));
}
function syncSelectBox(sel, keep){
  const options=productOptions();
  sel.innerHTML=options.map(p=>`<option value="${p.id}">${p.name}</option>`).join('');
  sel.value=options.some(p=>p.id===keep)?keep:'none';
  return sel.value;
}
function renderConditions(){
  conditionGrid.innerHTML='';
  conditions.forEach(c=>{
    const b=document.createElement('button');
    b.className='chip'+(state.selected.includes(c.id)?' active':'');
    b.textContent=c.label;
    b.onclick=()=>toggleCondition(c.id);
    conditionGrid.appendChild(b);
  });
}
function toggleCondition(id){
  if(id==='emmetrope'){ state.selected=['emmetrope']; syncProducts(); renderAll(); return; }
  state.selected=state.selected.filter(v=>v!=='emmetrope');
  if(id==='myopia') state.selected=state.selected.filter(v=>v!=='hyperopia');
  if(id==='hyperopia') state.selected=state.selected.filter(v=>v!=='myopia');
  if(state.selected.includes(id)) state.selected=state.selected.filter(v=>v!==id); else state.selected.push(id);
  if(!state.selected.length) state.selected=['emmetrope'];
  syncProducts(); renderAll();
}
function renderSliders(){
  const f=selectedFlags();
  const items=[];
  if(f.myopia) items.push(['myopia','근시 강도']);
  if(f.hyperopia) items.push(['hyperopia','원시 강도']);
  if(f.astigmatism) items.push(['astigmatism','난시 강도'],['axis','난시 축']);
  if(f.presbyopia) items.push(['presbyopia','노안 강도']);
  sliderList.innerHTML='';
  if(!items.length){
    sliderList.innerHTML='<div class="slider-row"><div class="muted">정시 상태에서는 추가 증상 강도 조절이 없습니다.</div></div>';
    return;
  }
  items.forEach(([key,label])=>{
    const value=state.severity[key];
    const min=key==='axis'?0:0, max=key==='axis'?30:100;
    const row=document.createElement('div'); row.className='slider-row';
    row.innerHTML=`<div class="slider-head"><span>${label}</span><span>${value}${key==='axis'?'°':'%'}</span></div><input type="range" min="${min}" max="${max}" value="${value}" step="1">`;
    row.querySelector('input').oninput=e=>{state.severity[key]=Number(e.target.value); renderSliders(); applyVisuals(); updateBadge();};
    sliderList.appendChild(row);
  });
}
function syncProducts(){
  state.leftProduct=syncSelectBox(leftProduct,state.leftProduct);
  state.rightProduct=syncSelectBox(rightProduct,state.rightProduct);
  scenes.forEach(sc=>{
    state.leftProduct=syncSelectBox(refs[sc.id].leftSel,state.leftProduct);
    state.rightProduct=syncSelectBox(refs[sc.id].rightSel,state.rightProduct);
  });
}
function bindProductEvents(){
  function pair(a,b,key){
    const fn=e=>{state[key]=e.target.value; syncProducts(); applyVisuals();};
    a.onchange=fn; b.onchange=fn;
  }
  pair(leftProduct, refs.day.leftSel, 'leftProduct');
  pair(rightProduct, refs.day.rightSel, 'rightProduct');
  scenes.slice(1).forEach(sc=>{
    refs[sc.id].leftSel.onchange=e=>{state.leftProduct=e.target.value; syncProducts(); applyVisuals();};
    refs[sc.id].rightSel.onchange=e=>{state.rightProduct=e.target.value; syncProducts(); applyVisuals();};
  });
}
function makeRow(scene){
  const row=document.createElement('div');
  row.className='scene-row';
  row.innerHTML=`
    <div class="scene-side">
      <div class="en">${scene.en.replace(/\\n/g,'<br>')}</div>
      <div class="ko">${scene.ko}</div>
      <div class="icon">${scene.icon}</div>
    </div>
    <div class="pane left ${scene.className}">
      <div class="row-head">
        <div class="side-pill"><span class="side-tag">좌측</span><select class="pill-select left-sel"></select></div>
        <div class="row-center">‹›</div>
      </div>
      <div class="stack left-stack ${scene.className}">
        <video class="base" autoplay muted loop playsinline crossorigin="anonymous"></video>
        <video class="near near-arm" autoplay muted loop playsinline crossorigin="anonymous"></video>
        <video class="near near-phone near-menu near-nav" autoplay muted loop playsinline crossorigin="anonymous"></video>
        <video class="near near-cart near-hands near-dash-left" autoplay muted loop playsinline crossorigin="anonymous"></video>
        <video class="near near-pasta near-wheel" autoplay muted loop playsinline crossorigin="anonymous"></video>
        <video class="ghost" autoplay muted loop playsinline crossorigin="anonymous"></video>
      </div>
    </div>
    <div class="pane right ${scene.className}">
      <div class="row-head" style="justify-content:flex-end">
        <div class="side-pill"><span class="side-tag">우측</span><select class="pill-select right-sel"></select></div>
      </div>
      <div class="stack right-stack ${scene.className}">
        <video class="base" autoplay muted loop playsinline crossorigin="anonymous"></video>
        <video class="near near-arm" autoplay muted loop playsinline crossorigin="anonymous"></video>
        <video class="near near-phone near-menu near-nav" autoplay muted loop playsinline crossorigin="anonymous"></video>
        <video class="near near-cart near-hands near-dash-left" autoplay muted loop playsinline crossorigin="anonymous"></video>
        <video class="near near-pasta near-wheel" autoplay muted loop playsinline crossorigin="anonymous"></video>
        <video class="ghost" autoplay muted loop playsinline crossorigin="anonymous"></video>
      </div>
    </div>`;
  rowsWrap.appendChild(row);
  const leftStack=row.querySelector('.left-stack');
  const rightStack=row.querySelector('.right-stack');
  const fill=(stack)=>{stack.querySelectorAll('video').forEach(v=>{v.src=scene.url; v.load(); v.play().catch(()=>{});});};
  fill(leftStack); fill(rightStack);
  refs[scene.id]={leftStack,rightStack,leftSel:row.querySelector('.left-sel'),rightSel:row.querySelector('.right-sel')};
}
scenes.forEach(makeRow);

function computeEffect(productId){
  const f=selectedFlags();
  let myo=f.myopia?state.severity.myopia/100:0;
  let hyp=f.hyperopia?state.severity.hyperopia/100:0;
  let ast=f.astigmatism?state.severity.astigmatism/100:0;
  let pre=f.presbyopia?state.severity.presbyopia/100:0;
  const axis=state.severity.axis;
  if(f.emmetrope){ myo=0; hyp=0; ast=0; pre=0; }
  let maxGlow=false;
  switch(productId){
    case 'oasys': myo*=0.08; hyp*=0.10; break;
    case 'max1day': myo*=0.05; hyp*=0.07; maxGlow=true; break;
    case 'moistMulti': myo*=0.18; hyp*=0.18; pre*=0.08; break;
    case 'maxMulti': myo*=0.12; hyp*=0.12; pre*=0.04; maxGlow=true; break;
    case 'oasysToric': myo*=0.18; hyp*=0.18; ast*=0.10; break;
    case 'maxToric': myo*=0.14; hyp*=0.14; ast*=0.06; maxGlow=true; break;
    case 'maxMultiToric': myo*=0.10; hyp*=0.10; ast*=0.06; pre*=0.04; maxGlow=true; break;
  }
  let baseBlur=0, nearBlur=0;
  // myopia: far blurred globally, near clearer
  if(myo>0){ baseBlur += 2.0 + myo*7.5; nearBlur += Math.max(0,myo-0.42)*4.2; }
  // hyperopia and presbyopia: near only blurred
  nearBlur += hyp*10.5;
  nearBlur += pre*12.5;
  // astigmatism: global slight blur + ghosting
  baseBlur += ast*1.2;
  nearBlur += ast*0.6;
  let contrast = 1 - (myo*0.06 + hyp*0.05 + pre*0.02 + ast*0.03);
  let brightness = 1 - (myo*0.03 + hyp*0.02 + ast*0.01);
  if(maxGlow){ contrast += .05; brightness += .02; baseBlur *= .87; nearBlur *= .84; }
  const dist=5 + ast*22;
  const rad=axis*Math.PI/180;
  return {
    baseFilter:`blur(${baseBlur.toFixed(2)}px) contrast(${contrast.toFixed(3)}) brightness(${brightness.toFixed(3)})`,
    nearFilter:`blur(${nearBlur.toFixed(2)}px) contrast(${contrast.toFixed(3)}) brightness(${brightness.toFixed(3)})`,
    nearOpacity: (hyp>0||pre>0||myo>0||ast>0)?1:0,
    // if myopia only, near overlays should be clearer than base
    ghostOpacity: ast?Math.min(.5, ast*.7):0,
    ghostX:`${(Math.cos(rad)*dist).toFixed(1)}px`,
    ghostY:`${(Math.sin(rad)*dist).toFixed(1)}px`,
    ghostBlur:`${(0.9+ast*3.4).toFixed(2)}px`,
    myopiaOnly: myo>0 && hyp===0 && pre===0 && ast===0
  };
}
function applyToStack(stack,e){
  stack.style.setProperty('--baseFilter', e.baseFilter);
  stack.style.setProperty('--nearOpacity', e.nearOpacity);
  stack.style.setProperty('--ghostOpacity', e.ghostOpacity);
  stack.style.setProperty('--ghostX', e.ghostX);
  stack.style.setProperty('--ghostY', e.ghostY);
  stack.style.setProperty('--ghostBlur', e.ghostBlur);
  const nears=stack.querySelectorAll('.near');
  nears.forEach(v=>{
    v.style.filter = e.myopiaOnly ? 'blur(0px) contrast(1.02) brightness(1.02)' : e.nearFilter;
  });
  stack.querySelector('.base').style.filter=e.baseFilter;
}
function applyVisuals(){
  scenes.forEach(sc=>{
    applyToStack(refs[sc.id].leftStack, computeEffect(state.leftProduct));
    applyToStack(refs[sc.id].rightStack, computeEffect(state.rightProduct));
  });
  updateBadge();
}
function updateBadge(){
  const label=conditions.filter(c=>state.selected.includes(c.id)).map(c=>c.label).join(' + ');
  conditionBadge.textContent=`상태 : ${label}`;
}
leftProduct.onchange=e=>{state.leftProduct=e.target.value; syncProducts(); applyVisuals();};
rightProduct.onchange=e=>{state.rightProduct=e.target.value; syncProducts(); applyVisuals();};
function renderAll(){ renderConditions(); renderSliders(); syncProducts(); applyVisuals(); updateBadge(); }
resetBtn.onclick=()=>{
  state.selected=['emmetrope'];
  state.severity={myopia:33,hyperopia:0,astigmatism:0,presbyopia:50,axis:14};
  state.leftProduct='none'; state.rightProduct='none';
  renderAll();
};
renderAll();
bindProductEvents();
setInterval(()=>{
  scenes.forEach(sc=>{
    [refs[sc.id].leftStack,refs[sc.id].rightStack].forEach(stack=>{
      const vids=stack.querySelectorAll('video');
      const master=vids[0];
      vids.forEach(v=>{ if(v===master) return; if(Math.abs(master.currentTime-v.currentTime)>0.08){ try{v.currentTime=master.currentTime;}catch(e){} } if(master.paused&&!v.paused)v.pause(); if(!master.paused&&v.paused)v.play().catch(()=>{}); });
    });
  });
},500);
</script>
