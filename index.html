<!DOCTYPE html>
<html lang="ko"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>콘택트렌즈 시뮬레이터</title>
<style>
:root{--line:rgba(255,255,255,.16);--text:#fff;--muted:#d8e8ff;--r:18px}
*{box-sizing:border-box}body{margin:0;font-family:Inter,-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Arial,sans-serif;color:var(--text);background:radial-gradient(circle at 50% 0%,#0a4eaa 0%,#062f6c 24%,#041a3a 52%,#031028 100%)}
.app{max-width:1480px;margin:0 auto;padding:18px}.shell{display:grid;grid-template-columns:360px 1fr;gap:18px;align-items:start}
.panel{background:linear-gradient(180deg,rgba(10,44,99,.96),rgba(7,31,70,.98));border:1px solid var(--line);border-radius:var(--r);box-shadow:0 18px 40px rgba(0,0,0,.28)}
.sidebar{padding:18px;display:flex;flex-direction:column;gap:16px;position:sticky;top:12px}.viewer{padding:14px;display:flex;flex-direction:column;gap:12px}
.kicker{font-size:11px;font-weight:800;letter-spacing:.18em;text-transform:uppercase;color:#b9dcff}h1{margin:0;font-size:28px;line-height:1.08}
.section{display:flex;flex-direction:column;gap:10px;background:linear-gradient(180deg,rgba(255,255,255,.03),rgba(255,255,255,.015));border:1px solid var(--line);border-radius:16px;padding:14px}.section h3{margin:0;font-size:15px}
.muted{font-size:12px;color:var(--muted);line-height:1.5}.grid-chip{display:flex;flex-wrap:wrap;gap:10px}
.chip{appearance:none;border:1px solid rgba(255,255,255,.14);background:rgba(255,255,255,.03);color:#fff;padding:10px 18px;border-radius:16px;font-size:14px;font-weight:800;cursor:pointer;transition:.16s}
.chip.active{border-color:rgba(182,222,255,.92);background:linear-gradient(180deg,rgba(0,115,230,.24),rgba(0,115,230,.14));box-shadow:inset 0 0 0 1px rgba(255,255,255,.2),0 0 18px rgba(0,115,230,.24)}
.slider-list{display:flex;flex-direction:column;gap:12px}.slider-row{padding:12px;border:1px solid var(--line);border-radius:14px;background:rgba(255,255,255,.03)}
.slider-head{display:flex;justify-content:space-between;gap:8px;margin-bottom:8px;font-weight:800}input[type=range]{width:100%;accent-color:#b9dcff}
.field{display:flex;flex-direction:column;gap:6px}.field label{font-size:13px;font-weight:800}
select{width:100%;height:46px;border-radius:14px;padding:0 14px;border:1px solid rgba(255,255,255,.18);background:linear-gradient(180deg,#0b3a84,#0a2d66);color:#fff;font-size:15px}
.toolbar{display:flex;justify-content:space-between;gap:8px;flex-wrap:wrap;align-items:center}.toolbar-left,.toolbar-right{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.badge{display:inline-flex;align-items:center;padding:11px 16px;border-radius:999px;border:1px solid rgba(255,255,255,.16);background:rgba(255,255,255,.04);font-size:14px}
.ghost-btn{border:1px solid rgba(255,255,255,.18);background:linear-gradient(180deg,#0b3a84,#0a2d66);color:#fff;border-radius:14px;padding:10px 14px;font-weight:800;cursor:pointer}
.stage{position:relative;overflow:hidden;border-radius:22px;border:1px solid var(--line);aspect-ratio:16/9;background:#030d1f}.pane{position:absolute;inset:0;overflow:hidden}
#leftPane{clip-path:polygon(0 0,var(--split,50%) 0,var(--split,50%) 100%,0 100%)}#rightPane{clip-path:polygon(var(--split,50%) 0,100% 0,100% 100%,var(--split,50%) 100%)}
.stack{position:absolute;inset:0}.stack video,.stack .overlay{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
.stack .base{filter:var(--baseFilter)}.stack .farLayer{filter:var(--farFilter);opacity:var(--farOpacity);clip-path:var(--farClip)}.stack .nearLayer{filter:var(--nearFilter);opacity:var(--nearOpacity);clip-path:var(--nearClip)}
.stack .ghostFar{filter:var(--farFilter);opacity:var(--ghostFarOpacity);transform:translate(var(--ghostX),var(--ghostY));mix-blend-mode:screen;clip-path:var(--farClip)}
.stack .ghostNear{filter:var(--nearFilter);opacity:var(--ghostNearOpacity);transform:translate(var(--ghostX),var(--ghostY));mix-blend-mode:screen;clip-path:var(--nearClip)}
.stack .halo{opacity:var(--haloOpacity);background:radial-gradient(circle at 52% 52%, rgba(255,255,255,.34) 0 4%, rgba(255,255,255,.12) 8%, rgba(255,255,255,0) 18%),radial-gradient(circle at 72% 26%, rgba(255,255,255,.16) 0 3%, rgba(255,255,255,0) 14%),radial-gradient(circle at 20% 70%, rgba(255,255,255,.10) 0 2.2%, rgba(255,255,255,0) 12%);filter:blur(var(--haloBlur)) brightness(var(--haloBrightness));mix-blend-mode:screen}
.stack .axisLine{opacity:var(--axisOpacity);background:linear-gradient(var(--axisDeg), transparent 49%, rgba(255,255,255,.9) 50%, transparent 51%);mix-blend-mode:screen}
.divider{position:absolute;top:0;bottom:0;left:var(--split,50%);width:2px;background:rgba(255,255,255,.85);transform:translateX(-1px);z-index:8}
.handle{position:absolute;left:var(--split,50%);top:50%;transform:translate(-50%,-50%);width:46px;height:46px;border-radius:50%;background:#fff;color:#1f2b43;border:1px solid rgba(255,255,255,.3);display:grid;place-items:center;font-size:24px;font-weight:900;z-index:9;cursor:ew-resize}
.sideTag{position:absolute;top:18px;display:flex;align-items:center;gap:8px;z-index:7;padding:8px 12px;border-radius:14px;background:rgba(7,11,18,.72);border:1px solid rgba(255,255,255,.12)}.sideTag.left{left:18px}.sideTag.right{right:18px}.sideTag strong{font-size:16px}
.inlineSel{height:38px;border-radius:12px;padding:0 12px;background:linear-gradient(180deg,#1086ff,#0b66d0);border:1px solid rgba(255,255,255,.18);color:#fff;font-weight:800}
.footer-note{font-size:12px;color:#d8e7ff;text-align:center}
@media (max-width:1180px){.shell{grid-template-columns:1fr}.sidebar{position:static}}
</style></head>
<body><div class="app"><div class="shell"><aside class="panel sidebar">
<div><div class="kicker">ACUVUE Vision Simulator</div><h1>콘택트렌즈 시뮬레이터</h1></div>
<div class="section"><h3>1단계 | 굴절 이상 선택 (중복 선택 가능)</h3><div class="grid-chip" id="conditionGrid"></div></div>
<div class="section"><h3>2단계 | 증상 강도 조절</h3><div class="slider-list" id="sliderList"></div></div>
<div class="section"><h3>3단계 | 제품 선택 (좌/우 비교)</h3><div class="field"><label>좌측 화면 제품</label><select id="leftProduct"></select></div><div class="field"><label>우측 화면 제품</label><select id="rightProduct"></select></div><div class="muted">None 선택 시 해당 화면은 제품 미적용 상태입니다.</div></div>
</aside>
<section class="panel viewer">
<div class="toolbar"><div class="toolbar-left"><span class="badge" id="stateBadge">상태 : 정시</span><span class="badge" id="sceneBadge">Scene : Day to Day</span></div><div class="toolbar-right"><select id="sceneSelect" style="width:220px"><option value="day">Day to Day</option><option value="dine">Dine Out</option><option value="night">Night Driving</option></select><button class="ghost-btn" id="resetBtn">초기화</button></div></div>
<div class="stage" id="stage">
<div class="pane" id="leftPane"><div class="stack" id="leftStack"><video class="base" id="leftBase" autoplay muted loop playsinline crossorigin="anonymous"></video><video class="farLayer overlay" id="leftFar" autoplay muted loop playsinline crossorigin="anonymous"></video><video class="nearLayer overlay" id="leftNear" autoplay muted loop playsinline crossorigin="anonymous"></video><video class="ghostFar overlay" id="leftGhostFar" autoplay muted loop playsinline crossorigin="anonymous"></video><video class="ghostNear overlay" id="leftGhostNear" autoplay muted loop playsinline crossorigin="anonymous"></video><div class="halo overlay"></div><div class="axisLine overlay"></div></div></div>
<div class="pane" id="rightPane"><div class="stack" id="rightStack"><video class="base" id="rightBase" autoplay muted loop playsinline crossorigin="anonymous"></video><video class="farLayer overlay" id="rightFar" autoplay muted loop playsinline crossorigin="anonymous"></video><video class="nearLayer overlay" id="rightNear" autoplay muted loop playsinline crossorigin="anonymous"></video><video class="ghostFar overlay" id="rightGhostFar" autoplay muted loop playsinline crossorigin="anonymous"></video><video class="ghostNear overlay" id="rightGhostNear" autoplay muted loop playsinline crossorigin="anonymous"></video><div class="halo overlay"></div><div class="axisLine overlay"></div></div></div>
<div class="sideTag left"><strong>좌측</strong><select class="inlineSel" id="leftInline"></select></div><div class="sideTag right"><strong>우측</strong><select class="inlineSel" id="rightInline"></select></div>
<div class="divider"></div><div class="handle" id="handle">‹›</div></div>
<div class="footer-note">* 본 시뮬레이션은 이해를 돕기 위한 예시이며, 실제 착용 시 개인에 따라 차이가 있을 수 있습니다.</div>
</section></div></div>
<script>
const scenes={day:{label:'Day to Day',url:'https://assets.contentstack.io/v3/assets/blta38a56f5447b1cc5/bltf0b4b11efcbe4ec4/66a8b2b0a3b12e0a0b5f5da9/PureseeLens_dayToDay_High.mp4?branch=prod_alias',nearClip:'polygon(0% 100%, 0% 82%, 10% 72%, 18% 63%, 24% 58%, 31% 49%, 38% 42%, 45% 33%, 53% 23%, 61% 24%, 63% 34%, 62% 48%, 59% 61%, 57% 73%, 68% 78%, 80% 83%, 89% 89%, 100% 100%)',farClip:'polygon(0 0,100% 0,100% 100%,89% 89%,80% 83%,68% 78%,57% 73%,59% 61%,62% 48%,63% 34%,61% 24%,53% 23%,45% 33%,38% 42%,31% 49%,24% 58%,18% 63%,10% 72%,0% 82%)'},dine:{label:'Dine Out',url:'https://assets.contentstack.io/v3/assets/blta38a56f5447b1cc5/blta6e961a6e0f6a90f/66a8b2ae90e89afe7d28ffc4/PureseeLens_dineOut_High.mp4?branch=prod_alias',nearClip:'polygon(30% 100%, 27% 87%, 31% 74%, 36% 60%, 40% 48%, 44% 38%, 50% 30%, 58% 31%, 62% 42%, 64% 58%, 66% 77%, 69% 89%, 75% 100%)',farClip:'polygon(0 0,100% 0,100% 100%,75% 100%,69% 89%,66% 77%,64% 58%,62% 42%,58% 31%,50% 30%,44% 38%,40% 48%,36% 60%,31% 74%,27% 87%,30% 100%,0 100%)'},night:{label:'Night Driving',url:'https://assets.contentstack.io/v3/assets/blta38a56f5447b1cc5/blt1b4784f4566a173b/66a8b2b7971644620e9d0df9/PureseeLens_nightDriving_High.mp4?branch=prod_alias',nearClip:'polygon(5% 100%, 3% 86%, 5% 74%, 12% 66%, 23% 63%, 33% 64%, 41% 71%, 43% 84%, 43% 100%, 62% 100%, 62% 79%, 66% 68%, 73% 63%, 86% 63%, 97% 67%, 100% 100%)',farClip:'polygon(0 0,100% 0,100% 100%,97% 67%,86% 63%,73% 63%,66% 68%,62% 79%,62% 100%,43% 100%,43% 84%,41% 71%,33% 64%,23% 63%,12% 66%,5% 74%,3% 86%,5% 100%,0 100%)'}};
const conditions=[{id:'emmetrope',label:'정시'},{id:'myopia',label:'근시'},{id:'hyperopia',label:'원시'},{id:'astigmatism',label:'난시'},{id:'presbyopia',label:'노안'}];
const products=[{id:'none',name:'None (아무것도 선택 안함)'},{id:'oasys',name:'오아시스'},{id:'max1day',name:'맥스 원데이'},{id:'moistMulti',name:'모이스트 멀티포컬'},{id:'maxMulti',name:'맥스 멀티포컬'},{id:'oasysToric',name:'오아시스 난시'},{id:'maxToric',name:'맥스 난시'},{id:'maxMultiToric',name:'맥스 멀티 난시'}];
const state={selected:['emmetrope'],severity:{myopia:35,hyperopia:35,astigmatism:35,presbyopia:50,axis:14},scene:'day',leftProduct:'none',rightProduct:'none',split:50};
const dom={conditionGrid:document.getElementById('conditionGrid'),sliderList:document.getElementById('sliderList'),leftProduct:document.getElementById('leftProduct'),rightProduct:document.getElementById('rightProduct'),leftInline:document.getElementById('leftInline'),rightInline:document.getElementById('rightInline'),sceneSelect:document.getElementById('sceneSelect'),resetBtn:document.getElementById('resetBtn'),stateBadge:document.getElementById('stateBadge'),sceneBadge:document.getElementById('sceneBadge'),stage:document.getElementById('stage'),handle:document.getElementById('handle'),leftStack:document.getElementById('leftStack'),rightStack:document.getElementById('rightStack'),videos:[document.getElementById('leftBase'),document.getElementById('leftFar'),document.getElementById('leftNear'),document.getElementById('leftGhostFar'),document.getElementById('leftGhostNear'),document.getElementById('rightBase'),document.getElementById('rightFar'),document.getElementById('rightNear'),document.getElementById('rightGhostFar'),document.getElementById('rightGhostNear')]};
function flags(){return{emmetrope:state.selected.includes('emmetrope'),myopia:state.selected.includes('myopia'),hyperopia:state.selected.includes('hyperopia'),astigmatism:state.selected.includes('astigmatism'),presbyopia:state.selected.includes('presbyopia')}}
function renderConditions(){dom.conditionGrid.innerHTML='';conditions.forEach(c=>{const b=document.createElement('button');b.className='chip'+(state.selected.includes(c.id)?' active':'');b.textContent=c.label;b.onclick=()=>toggleCondition(c.id);dom.conditionGrid.appendChild(b)})}
function toggleCondition(id){if(id==='emmetrope'){state.selected=['emmetrope'];syncProductOptions();renderAll();return}state.selected=state.selected.filter(v=>v!=='emmetrope');if(id==='myopia')state.selected=state.selected.filter(v=>v!=='hyperopia');if(id==='hyperopia')state.selected=state.selected.filter(v=>v!=='myopia');if(state.selected.includes(id))state.selected=state.selected.filter(v=>v!==id);else state.selected.push(id);if(!state.selected.length)state.selected=['emmetrope'];syncProductOptions();renderAll()}
function renderSliders(){const f=flags(),list=[];if(f.myopia)list.push(['myopia','근시 강도',0,100,'%']);if(f.hyperopia)list.push(['hyperopia','원시 강도',0,100,'%']);if(f.astigmatism){list.push(['astigmatism','난시 강도',0,100,'%']);list.push(['axis','난시 축',0,30,'°'])}if(f.presbyopia)list.push(['presbyopia','노안 강도',0,100,'%']);dom.sliderList.innerHTML='';if(!list.length){const r=document.createElement('div');r.className='slider-row';r.innerHTML='<div class="muted">정시 상태에서는 추가 증상 강도 조절이 없습니다.</div>';dom.sliderList.appendChild(r);return}list.forEach(([key,label,min,max,suf])=>{const r=document.createElement('div');r.className='slider-row';r.innerHTML=`<div class="slider-head"><span>${label}</span><span>${state.severity[key]}${suf}</span></div><input type="range" min="${min}" max="${max}" step="1" value="${state.severity[key]}">`;r.querySelector('input').oninput=e=>{state.severity[key]=+e.target.value;renderSliders();applyVisuals();updateBadges()};dom.sliderList.appendChild(r)})}
function availableProducts(){const f=flags(),ids=new Set(['none']);if(f.emmetrope)return products.filter(p=>ids.has(p.id));if(f.myopia||f.hyperopia){ids.add('oasys');ids.add('max1day')}if(f.presbyopia){ids.add('moistMulti');ids.add('maxMulti')}if(f.astigmatism){ids.add('oasysToric');ids.add('maxToric')}if(f.astigmatism&&f.presbyopia)ids.add('maxMultiToric');return products.filter(p=>ids.has(p.id))}
function syncSelect(el,keep){const opts=availableProducts();el.innerHTML=opts.map(p=>`<option value="${p.id}">${p.name}</option>`).join('');el.value=opts.some(p=>p.id===keep)?keep:'none';return el.value}
function syncProductOptions(){state.leftProduct=syncSelect(dom.leftProduct,state.leftProduct);state.rightProduct=syncSelect(dom.rightProduct,state.rightProduct);state.leftProduct=syncSelect(dom.leftInline,state.leftProduct);state.rightProduct=syncSelect(dom.rightInline,state.rightProduct)}
function bindProducts(){const bind=(a,b,key)=>{const fn=e=>{state[key]=e.target.value;a.value=state[key];b.value=state[key];applyVisuals()};a.onchange=fn;b.onchange=fn};bind(dom.leftProduct,dom.leftInline,'leftProduct');bind(dom.rightProduct,dom.rightInline,'rightProduct')}
function correctedResiduals(pid){const f=flags();let r={myopia:f.myopia?state.severity.myopia/100:0,hyperopia:f.hyperopia?state.severity.hyperopia/100:0,astigmatism:f.astigmatism?state.severity.astigmatism/100:0,presbyopia:f.presbyopia?state.severity.presbyopia/100:0};let max=false;switch(pid){case'oasys':r.myopia*=.08;r.hyperopia*=.08;break;case'max1day':r.myopia*=.04;r.hyperopia*=.04;max=true;break;case'moistMulti':r.presbyopia*=.06;r.myopia*=.10;r.hyperopia*=.10;break;case'maxMulti':r.presbyopia*=.03;r.myopia*=.06;r.hyperopia*=.06;max=true;break;case'oasysToric':r.astigmatism*=.08;r.myopia*=.10;r.hyperopia*=.10;break;case'maxToric':r.astigmatism*=.04;r.myopia*=.06;r.hyperopia*=.06;max=true;break;case'maxMultiToric':r.astigmatism*=.04;r.presbyopia*=.03;r.myopia*=.05;r.hyperopia*=.05;max=true;break}return{r,max}}
function effectFor(pid){const {r,max}=correctedResiduals(pid);const axis=state.severity.axis;let farBlur=r.myopia*14+Math.max(0,r.hyperopia-.55)*6.4+r.astigmatism*2.4;let nearBlur=Math.max(0,r.myopia-.45)*7.2+r.hyperopia*11.8+r.presbyopia*12.2+r.astigmatism*2.4;let baseBlur=r.astigmatism*.4+Math.max(0,r.myopia-.88)*1+Math.max(0,r.hyperopia-.88)*.8;let farOpacity=farBlur>.08?1:0,nearOpacity=nearBlur>.08?1:0;const dist=5+r.astigmatism*18,rad=axis*Math.PI/180;let ghostX=Math.cos(rad)*dist,ghostY=Math.sin(rad)*dist,ghostNearOpacity=r.astigmatism?Math.min(.56,r.astigmatism*.74):0,ghostFarOpacity=r.astigmatism?Math.min(.52,r.astigmatism*.66):0,axisOpacity=r.astigmatism?Math.min(.34,r.astigmatism*.5):0;let haloOpacity=state.scene==='night'?.18:.05,haloBlur=state.scene==='night'?8.5:3.5,haloBrightness=state.scene==='night'?1.08:1.02,contrast=1-(r.myopia*.06+r.hyperopia*.05+r.presbyopia*.02+r.astigmatism*.04),brightness=1-(r.myopia*.03+r.hyperopia*.02+r.astigmatism*.01);if(max){haloOpacity*=.32;haloBlur*=.5;haloBrightness=1.01;farBlur*=.9;nearBlur*=.9;baseBlur*=.9;ghostNearOpacity*=.8;ghostFarOpacity*=.8;contrast+=.04;brightness+=.015}const s=scenes[state.scene];return{baseFilter:`blur(${baseBlur.toFixed(2)}px) contrast(${contrast.toFixed(3)}) brightness(${brightness.toFixed(3)})`,farFilter:`blur(${farBlur.toFixed(2)}px) contrast(${contrast.toFixed(3)}) brightness(${brightness.toFixed(3)})`,nearFilter:`blur(${nearBlur.toFixed(2)}px) contrast(${contrast.toFixed(3)}) brightness(${brightness.toFixed(3)})`,farOpacity,nearOpacity,farClip:s.farClip,nearClip:s.nearClip,ghostX:`${ghostX.toFixed(1)}px`,ghostY:`${ghostY.toFixed(1)}px`,ghostNearOpacity,ghostFarOpacity,haloOpacity,haloBlur:`${haloBlur.toFixed(2)}px`,haloBrightness,axisOpacity,axisDeg:`${axis}deg`}}
function applyStack(st,e){st.style.setProperty('--baseFilter',e.baseFilter);st.style.setProperty('--farFilter',e.farFilter);st.style.setProperty('--nearFilter',e.nearFilter);st.style.setProperty('--farOpacity',e.farOpacity);st.style.setProperty('--nearOpacity',e.nearOpacity);st.style.setProperty('--farClip',e.farClip);st.style.setProperty('--nearClip',e.nearClip);st.style.setProperty('--ghostX',e.ghostX);st.style.setProperty('--ghostY',e.ghostY);st.style.setProperty('--ghostNearOpacity',e.ghostNearOpacity);st.style.setProperty('--ghostFarOpacity',e.ghostFarOpacity);st.style.setProperty('--haloOpacity',e.haloOpacity);st.style.setProperty('--haloBlur',e.haloBlur);st.style.setProperty('--haloBrightness',e.haloBrightness);st.style.setProperty('--axisOpacity',e.axisOpacity);st.style.setProperty('--axisDeg',e.axisDeg)}
function applyVisuals(){applyStack(dom.leftStack,effectFor(state.leftProduct));applyStack(dom.rightStack,effectFor(state.rightProduct));updateBadges()}
function updateBadges(){const labels=conditions.filter(c=>state.selected.includes(c.id)).map(c=>c.label).join(' + ');dom.stateBadge.textContent=`상태 : ${labels}`;dom.sceneBadge.textContent=`Scene : ${scenes[state.scene].label}`}
function setScene(id){state.scene=id;const src=scenes[id].url;dom.videos.forEach(v=>{if(v.src!==src){v.src=src;v.load()}v.play().catch(()=>{})});applyVisuals();updateBadges()}
function renderAll(){renderConditions();renderSliders();syncProductOptions();bindProducts();applyVisuals();updateBadges()}
dom.sceneSelect.onchange=e=>setScene(e.target.value);dom.resetBtn.onclick=()=>{state.selected=['emmetrope'];state.severity={myopia:35,hyperopia:35,astigmatism:35,presbyopia:50,axis:14};state.leftProduct='none';state.rightProduct='none';setSplit(50);renderAll();setScene('day')};
function syncVideos(){const m=dom.videos[0];dom.videos.forEach(v=>{if(v===m)return;if(Math.abs(v.currentTime-m.currentTime)>.08){try{v.currentTime=m.currentTime}catch(e){}}if(m.paused&&!v.paused)v.pause();if(!m.paused&&v.paused)v.play().catch(()=>{})})}setInterval(syncVideos,450);
function setSplit(p){state.split=Math.max(18,Math.min(82,p));dom.stage.style.setProperty('--split',state.split+'%')}setSplit(50);let dragging=false;function moveSplit(x){const r=dom.stage.getBoundingClientRect();setSplit(((x-r.left)/r.width)*100)}dom.handle.addEventListener('pointerdown',e=>{dragging=true;dom.handle.setPointerCapture(e.pointerId)});dom.handle.addEventListener('pointermove',e=>{if(dragging)moveSplit(e.clientX)});dom.handle.addEventListener('pointerup',()=>dragging=false);
renderAll();setScene('day');
</script></body></html>
