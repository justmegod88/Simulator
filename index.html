<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>콘택트렌즈 시뮬레이터</title>
<style>
:root{
  --bg1:#0a2d63; --bg2:#005eb8; --panel:#0c2345; --panel2:#13376b; --line:rgba(255,255,255,.14);
  --text:#ffffff; --muted:#dbe9ff; --blue:#005eb8; --blue-soft:#7cc3ff; --blue-deep:#004a93; --white-glow:rgba(255,255,255,.18);
  --radius:18px; --shadow:0 18px 42px rgba(0,18,44,.30);
}
*{box-sizing:border-box}
body{
  margin:0;font-family:Inter,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;color:var(--text);
  background:
    radial-gradient(circle at 50% -10%, rgba(0,94,184,.55) 0%, rgba(0,94,184,.18) 24%, rgba(255,255,255,0) 48%),
    linear-gradient(180deg,#0a1b36 0%, #0a2550 42%, #06162d 100%);
}
.app{max-width:1520px;margin:0 auto;padding:18px}
.shell{display:grid;grid-template-columns:350px 1fr;gap:18px;align-items:start}
.panel{
  background:linear-gradient(180deg,rgba(12,35,69,.94),rgba(8,28,56,.97));
  border:1px solid rgba(255,255,255,.12);border-radius:var(--radius);box-shadow:var(--shadow);backdrop-filter:blur(12px)
}
.sidebar{padding:18px;display:flex;flex-direction:column;gap:16px;position:sticky;top:16px}
.viewer{padding:14px;display:flex;flex-direction:column;gap:12px}
.kicker{font-size:11px;font-weight:800;letter-spacing:.15em;text-transform:uppercase;color:var(--blue-soft)}
h1{margin:0;font-size:30px;line-height:1.08;color:#ffffff}
.section{
  display:flex;flex-direction:column;gap:10px;background:linear-gradient(180deg,rgba(19,55,107,.42),rgba(12,35,69,.22));
  border:1px solid var(--line);border-radius:16px;padding:14px
}
.section h3{margin:0;font-size:15px}
.muted{font-size:12px;color:var(--muted);line-height:1.5}
.grid-chip{display:flex;flex-wrap:wrap;gap:10px}
.chip{
  border:1px solid rgba(255,255,255,.14);background:rgba(255,255,255,.04);color:var(--text);padding:10px 18px;border-radius:16px;font-size:14px;font-weight:800;cursor:pointer;transition:.18s;
}
.chip:hover{border-color:rgba(132,198,255,.45);box-shadow:0 0 0 1px rgba(132,198,255,.08) inset}
.chip.active{border-color:rgba(124,195,255,.85);box-shadow:inset 0 0 0 1px rgba(255,255,255,.14),0 0 16px rgba(0,94,184,.22);background:linear-gradient(180deg,rgba(0,94,184,.42),rgba(0,94,184,.22))}
.slider-list{display:flex;flex-direction:column;gap:12px}
.slider-row{padding:11px 12px;border:1px solid var(--line);border-radius:14px;background:rgba(255,255,255,.04)}
.slider-head{display:flex;justify-content:space-between;gap:10px;font-size:14px;font-weight:800;margin-bottom:8px}
input[type=range]{width:100%;accent-color:var(--blue-soft)}
.select-wrap{display:flex;flex-direction:column;gap:12px}
.field{display:flex;flex-direction:column;gap:6px}
.field label{font-size:13px;font-weight:800}
select{
  width:100%;height:46px;border-radius:14px;border:1px solid rgba(255,255,255,.16);background:linear-gradient(180deg,#0f3b78,#0b2d5c);color:var(--text);padding:0 14px;font-size:15px;outline:none
}
select:focus{border-color:var(--blue-soft);box-shadow:0 0 0 3px rgba(132,198,255,.12)}
.toolbar{display:flex;justify-content:space-between;gap:10px;align-items:center;flex-wrap:wrap}
.toolbar-left,.toolbar-right{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.badge{display:inline-flex;align-items:center;gap:8px;padding:11px 16px;border-radius:999px;border:1px solid rgba(255,255,255,.16);background:linear-gradient(180deg,rgba(19,55,107,.90),rgba(12,35,69,.92));font-size:14px}
.ghost-btn{border:1px solid rgba(255,255,255,.16);background:linear-gradient(180deg,rgba(19,55,107,.90),rgba(12,35,69,.92));color:var(--text);border-radius:14px;padding:10px 14px;font-weight:800;cursor:pointer}
.ghost-btn:hover{border-color:rgba(132,198,255,.6);background:rgba(15,123,255,.12)}
.stage{position:relative;overflow:hidden;border-radius:20px;border:1px solid var(--line);aspect-ratio:16/9;background:#091a32}
.compare-pane{position:absolute;inset:0;overflow:hidden}
.compare-pane .stack{position:absolute;inset:0}
.compare-pane video,.compare-pane .ghost,.compare-pane .halo,.compare-pane .axis-line{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
.compare-pane video.base{filter:var(--baseFilter)}
.compare-pane video.far{
  opacity:var(--farOpacity);filter:var(--farFilter);
  -webkit-mask-image:var(--farMask);mask-image:var(--farMask);
  -webkit-mask-repeat:no-repeat;mask-repeat:no-repeat;
  -webkit-mask-size:100% 100%;mask-size:100% 100%;
}
.compare-pane video.near{
  opacity:var(--nearOpacity);filter:var(--nearFilter);
  -webkit-mask-image:var(--nearMask);mask-image:var(--nearMask);
  -webkit-mask-repeat:no-repeat;mask-repeat:no-repeat;
  -webkit-mask-size:100% 100%;mask-size:100% 100%;
}
.compare-pane .ghost{opacity:var(--ghostOpacity);transform:translate(var(--ghostX),var(--ghostY));filter:blur(var(--ghostBlur));mix-blend-mode:screen}
.compare-pane .ghost::before{content:"";position:absolute;inset:0;background:linear-gradient(180deg,rgba(255,255,255,.2),rgba(255,255,255,.05));opacity:.2}
.compare-pane .halo{pointer-events:none;opacity:var(--haloOpacity);background:
  radial-gradient(circle at 50% 48%, rgba(255,255,255,.42) 0 5%, rgba(255,255,255,.16) 9%, rgba(255,255,255,0) 22%),
  radial-gradient(circle at 74% 28%, rgba(255,255,255,.18) 0 4%, rgba(255,255,255,0) 18%);
  filter:blur(var(--haloBlur)) brightness(var(--haloBrightness));mix-blend-mode:screen}
.compare-pane .axis-line{pointer-events:none;opacity:var(--axisOpacity);background:linear-gradient(var(--axisDeg), transparent 48.7%, rgba(255,255,255,.95) 49.6%, transparent 50.4%);mix-blend-mode:screen}
#leftPane{clip-path:polygon(0 0,var(--split) 0,var(--split) 100%,0 100%)}
#rightPane{clip-path:polygon(var(--split) 0,100% 0,100% 100%,var(--split) 100%)}
.divider{position:absolute;top:0;bottom:0;left:var(--split);width:2px;background:rgba(255,255,255,.78);transform:translateX(-1px);z-index:5}
.handle{position:absolute;top:50%;left:var(--split);transform:translate(-50%,-50%);z-index:6;width:42px;height:42px;border-radius:50%;border:1px solid rgba(255,255,255,.25);background:#fff;color:#1c2433;display:grid;place-items:center;font-size:24px;font-weight:900;cursor:ew-resize;user-select:none}
.side-label{position:absolute;top:18px;display:flex;align-items:center;gap:8px;padding:8px 12px;border-radius:13px;background:rgba(255,255,255,.88);border:1px solid rgba(0,94,184,.16);color:#005eb8;box-shadow:0 8px 24px rgba(0,94,184,.12);z-index:4;font-weight:800}
.side-label.left{left:18px}.side-label.right{right:18px}
.label-select{height:36px;border-radius:12px;padding:0 12px;background:linear-gradient(180deg,#0d86ff,#005eb8);border:1px solid rgba(255,255,255,.6);color:#fff;font-weight:800}
.footer-note{font-size:12px;color:#d8e7ff;text-align:center;padding-top:2px}
@media (max-width:1180px){.shell{grid-template-columns:1fr}.sidebar{position:static}.app{padding:12px}}
@media (max-width:760px){h1{font-size:24px}.badge{font-size:12px;padding:9px 12px}.chip{padding:9px 14px;font-size:13px}.handle{width:38px;height:38px}}
</style>
</head>
<body>
<div class="app">
  <div class="shell">
    <aside class="panel sidebar">
      <div>
        <div class="kicker">ACUVUE Vision Simulator</div>
        <h1>콘택트렌즈 시뮬레이터</h1>
      </div>

      <div class="section">
        <h3>1단계 | 굴절 이상 선택 (중복 선택 가능)</h3>
        <div class="grid-chip" id="conditionGrid"></div>
      </div>

      <div class="section">
        <h3>2단계 | 증상 강도 조절</h3>
        <div class="slider-list" id="sliderList"></div>
      </div>

      <div class="section">
        <h3>3단계 | 제품 선택 (좌/우 비교)</h3>
        <div class="select-wrap">
          <div class="field">
            <label for="leftProduct">좌측 화면 제품</label>
            <select id="leftProduct"></select>
          </div>
          <div class="field">
            <label for="rightProduct">우측 화면 제품</label>
            <select id="rightProduct"></select>
          </div>
          <div class="muted">None 선택 시 해당 화면은 제품 미적용 상태입니다.</div>
        </div>
      </div>
    </aside>

    <section class="panel viewer">
      <div class="toolbar">
        <div class="toolbar-left">
          <span class="badge" id="conditionBadge">상태 : 정시</span>
          <span class="badge" id="sceneBadge">Scene : Day to Day</span>
        </div>
        <div class="toolbar-right">
          <select id="sceneSelect" style="width:220px;height:44px">
            <option value="day">Day to Day</option>
            <option value="dine">Dine Out</option>
            <option value="night">Night Driving</option>
          </select>
          <button class="ghost-btn" id="resetBtn">초기화</button>
        </div>
      </div>

      <div class="stage" id="stage">
        <div class="compare-pane" id="leftPane">
          <div class="stack" id="leftStack">
            <video class="base" id="leftBase" autoplay muted loop playsinline crossorigin="anonymous"></video>
            <video class="far" id="leftFar" autoplay muted loop playsinline crossorigin="anonymous"></video>
            <video class="near" id="leftNear" autoplay muted loop playsinline crossorigin="anonymous"></video>
            <div class="ghost"></div>
            <div class="halo"></div>
            <div class="axis-line"></div>
          </div>
        </div>
        <div class="compare-pane" id="rightPane">
          <div class="stack" id="rightStack">
            <video class="base" id="rightBase" autoplay muted loop playsinline crossorigin="anonymous"></video>
            <video class="far" id="rightFar" autoplay muted loop playsinline crossorigin="anonymous"></video>
            <video class="near" id="rightNear" autoplay muted loop playsinline crossorigin="anonymous"></video>
            <div class="ghost"></div>
            <div class="halo"></div>
            <div class="axis-line"></div>
          </div>
        </div>
        <div class="side-label left">좌측 <select class="label-select" id="leftInline"></select></div>
        <div class="side-label right">우측 <select class="label-select" id="rightInline"></select></div>
        <div class="divider"></div>
        <div class="handle" id="handle">‹›</div>
      </div>

      <div class="footer-note">* 본 시뮬레이션은 이해를 돕기 위한 예시이며, 실제 착용 시 개인에 따라 차이가 있을 수 있습니다.</div>
    </section>
  </div>
</div>

<script>
const scenes={
  day:{label:'Day to Day',url:'https://assets.contentstack.io/v3/assets/blta38a56f5447b1cc5/bltf0b4b11efcbe4ec4/66a8b2b0a3b12e0a0b5f5d9e/PureseeLens_dayToDay_High.mp4?branch=prod_alias'},
  dine:{label:'Dine Out',url:'https://assets.contentstack.io/v3/assets/blta38a56f5447b1cc5/blta6e961a6e0f6a90f/66a8b2ae90e89afe7d28ffc4/PureseeLens_dineOut_High.mp4?branch=prod_alias'},
  night:{label:'Night Driving',url:'https://assets.contentstack.io/v3/assets/blta38a56f5447b1cc5/blt1b4784f4566a173b/66a8b2b7971644620e9d0df9/PureseeLens_nightDriving_High.mp4?branch=prod_alias'}
};
const conditions=[
  {id:'emmetrope',label:'정시'},
  {id:'myopia',label:'근시'},
  {id:'hyperopia',label:'원시'},
  {id:'astigmatism',label:'난시'},
  {id:'presbyopia',label:'노안'}
];
const allProducts=[
  {id:'none',name:'None (아무것도 선택 안함)'},
  {id:'oasys',name:'오아시스'},
  {id:'max1day',name:'맥스 원데이'},
  {id:'moistMulti',name:'모이스트 멀티포컬'},
  {id:'maxMulti',name:'맥스 멀티포컬'},
  {id:'oasysToric',name:'오아시스 난시'},
  {id:'maxToric',name:'맥스 난시'},
  {id:'maxMultiToric',name:'맥스 멀티 난시'}
];

const state={
  selected:['emmetrope'],
  severity:{myopia:45,hyperopia:45,astigmatism:50,presbyopia:50,axis:14},
  scene:'day', leftProduct:'none', rightProduct:'none', split:50
};

const dom={
  conditionGrid:document.getElementById('conditionGrid'), sliderList:document.getElementById('sliderList'),
  leftProduct:document.getElementById('leftProduct'), rightProduct:document.getElementById('rightProduct'),
  leftInline:document.getElementById('leftInline'), rightInline:document.getElementById('rightInline'),
  sceneSelect:document.getElementById('sceneSelect'), conditionBadge:document.getElementById('conditionBadge'), sceneBadge:document.getElementById('sceneBadge'),
  resetBtn:document.getElementById('resetBtn'), stage:document.getElementById('stage'), handle:document.getElementById('handle'),
  leftBase:document.getElementById('leftBase'), leftFar:document.getElementById('leftFar'), leftNear:document.getElementById('leftNear'),
  rightBase:document.getElementById('rightBase'), rightFar:document.getElementById('rightFar'), rightNear:document.getElementById('rightNear'),
  leftStack:document.getElementById('leftStack'), rightStack:document.getElementById('rightStack')
};
const allVideos=[dom.leftBase,dom.leftFar,dom.leftNear,dom.rightBase,dom.rightFar,dom.rightNear];

function selectedFlags(){
  return {
    emmetrope:state.selected.includes('emmetrope'), myopia:state.selected.includes('myopia'), hyperopia:state.selected.includes('hyperopia'),
    astigmatism:state.selected.includes('astigmatism'), presbyopia:state.selected.includes('presbyopia')
  };
}

function productOptions(){
  const f=selectedFlags();
  let ids=new Set(['none']);
  if(f.emmetrope) return allProducts.filter(p=>ids.has(p.id));
  if(f.myopia||f.hyperopia){ ids.add('oasys'); ids.add('max1day'); }
  if(f.presbyopia){ ids.add('moistMulti'); ids.add('maxMulti'); }
  if(f.astigmatism){ ids.add('oasysToric'); ids.add('maxToric'); }
  if(f.astigmatism&&f.presbyopia){ ids.add('maxMultiToric'); }
  return allProducts.filter(p=>ids.has(p.id));
}

function renderConditions(){
  dom.conditionGrid.innerHTML='';
  conditions.forEach(c=>{
    const b=document.createElement('button');
    b.className='chip'+(state.selected.includes(c.id)?' active':'');
    b.textContent=c.label;
    b.onclick=()=>toggleCondition(c.id);
    dom.conditionGrid.appendChild(b);
  });
}

function toggleCondition(id){
  if(id==='emmetrope'){ state.selected=['emmetrope']; syncSelectOptions(); return renderAll(); }
  state.selected=state.selected.filter(v=>v!=='emmetrope');

  if(id==='myopia') state.selected=state.selected.filter(v=>v!=='hyperopia');
  if(id==='hyperopia') state.selected=state.selected.filter(v=>v!=='myopia');

  if(state.selected.includes(id)) state.selected=state.selected.filter(v=>v!==id); else state.selected.push(id);
  if(!state.selected.length) state.selected=['emmetrope'];

  syncSelectOptions(); renderAll();
}

function renderSliders(){
  const f=selectedFlags(); const items=[];
  if(f.myopia) items.push(['myopia','근시 강도']);
  if(f.hyperopia) items.push(['hyperopia','원시 강도']);
  if(f.astigmatism) items.push(['astigmatism','난시 강도'],['axis','난시 축']);
  if(f.presbyopia) items.push(['presbyopia','노안 강도']);
  if(!items.length) items.push(['emmetrope','정시 상태']);
  dom.sliderList.innerHTML='';
  items.forEach(([key,label])=>{
    const row=document.createElement('div'); row.className='slider-row';
    if(key==='emmetrope'){
      row.innerHTML='<div class="muted">정시 상태에서는 추가 증상 강도 조절이 없습니다.</div>';
      dom.sliderList.appendChild(row); return;
    }
    const value=state.severity[key]; const min= key==='axis'?0:0; const max= key==='axis'?30:100;
    row.innerHTML=`<div class="slider-head"><span>${label}</span><span>${value}${key==='axis'?'°':'%'}</span></div><input type="range" min="${min}" max="${max}" value="${value}" step="1">`;
    row.querySelector('input').oninput=e=>{state.severity[key]=Number(e.target.value); applyVisuals(); renderSliders(); updateBadges();};
    dom.sliderList.appendChild(row);
  });
}

function syncSelectBox(sel, keep){
  const options=productOptions();
  sel.innerHTML = options.map(p=>`<option value="${p.id}">${p.name}</option>`).join('');
  sel.value = options.some(p=>p.id===keep) ? keep : 'none';
  return sel.value;
}

function syncSelectOptions(){
  state.leftProduct = syncSelectBox(dom.leftProduct, state.leftProduct);
  state.rightProduct = syncSelectBox(dom.rightProduct, state.rightProduct);
  state.leftProduct = syncSelectBox(dom.leftInline, state.leftProduct);
  state.rightProduct = syncSelectBox(dom.rightInline, state.rightProduct);
}

function renderProducts(){
  syncSelectOptions();
  function bindPair(a,b,key){
    const fn=e=>{ state[key]=e.target.value; a.value=state[key]; b.value=state[key]; applyVisuals(); };
    a.onchange=fn; b.onchange=fn;
  }
  bindPair(dom.leftProduct,dom.leftInline,'leftProduct');
  bindPair(dom.rightProduct,dom.rightInline,'rightProduct');
}

function computeEffect(productId){
  const f=selectedFlags();
  const myo=f.myopia ? state.severity.myopia/100 : 0;
  const hyp=f.hyperopia ? state.severity.hyperopia/100 : 0;
  const ast=f.astigmatism ? state.severity.astigmatism/100 : 0;
  const pre=f.presbyopia ? state.severity.presbyopia/100 : 0;
  const axis=state.severity.axis;

  let residual={myopia:myo, hyperopia:hyp, astigmatism:ast, presbyopia:pre};
  let maxGlow=false;

  switch(productId){
    case 'oasys':
      residual.myopia*=0.08; residual.hyperopia*=0.10; maxGlow=false; break;
    case 'max1day':
      residual.myopia*=0.05; residual.hyperopia*=0.07; maxGlow=true; break;
    case 'moistMulti':
      residual.presbyopia*=0.08; residual.myopia*=0.12; residual.hyperopia*=0.14; maxGlow=false; break;
    case 'maxMulti':
      residual.presbyopia*=0.04; residual.myopia*=0.08; residual.hyperopia*=0.10; maxGlow=true; break;
    case 'oasysToric':
      residual.astigmatism*=0.10; residual.myopia*=0.12; residual.hyperopia*=0.14; maxGlow=false; break;
    case 'maxToric':
      residual.astigmatism*=0.06; residual.myopia*=0.08; residual.hyperopia*=0.10; maxGlow=true; break;
    case 'maxMultiToric':
      residual.astigmatism*=0.06; residual.presbyopia*=0.04; residual.myopia*=0.08; residual.hyperopia*=0.10; maxGlow=true; break;
  }
  if(productId==='none' || f.emmetrope){ maxGlow=false; }

  let baseBlur = 0;
  let farBlur = 0, nearBlur = 0;

  // 근시: 약하면 먼거리 위주, 강해질수록 근거리도 일부 흐림
  farBlur += residual.myopia * 12.0;
  nearBlur += Math.max(0, residual.myopia - 0.38) * 7.8;
  baseBlur += Math.max(0, residual.myopia - 0.80) * 1.8;

  // 원시: 약하면 근거리 위주, 강해질수록 먼거리도 흐림
  nearBlur += residual.hyperopia * 11.0;
  farBlur += Math.max(0, residual.hyperopia - 0.52) * 7.0;
  baseBlur += Math.max(0, residual.hyperopia - 0.82) * 1.2;

  // 노안: 근거리만 흐림, 강해질수록 근거리만 더 흐림
  nearBlur += residual.presbyopia * 12.5;

  // 난시: 원/근거리 모두 방향성 중첩과 흐림
  baseBlur += residual.astigmatism * 0.9;
  farBlur += residual.astigmatism * 1.8;
  nearBlur += residual.astigmatism * 1.8;

  let contrast = 1 - (residual.myopia*0.06 + residual.hyperopia*0.06 + residual.presbyopia*0.015 + residual.astigmatism*0.03);
  let brightness = 1 - (residual.myopia*0.03 + residual.hyperopia*0.02 + residual.astigmatism*0.01);
  let saturate = 1 - (residual.myopia*0.03 + residual.hyperopia*0.02 + residual.astigmatism*0.015);

  let haloOpacity = state.scene==='night' ? 0.22 : 0.07;
  let haloBlur = state.scene==='night' ? 10 : 4;
  let haloBrightness = state.scene==='night' ? 1.14 : 1.03;

  if(maxGlow){
    haloOpacity *= 0.28;
    haloBlur *= 0.50;
    haloBrightness = 1.01;
    contrast += 0.04;
    brightness += 0.01;
    saturate += 0.01;
  }
  if(productId==='none' && !f.myopia && !f.hyperopia && !f.astigmatism && !f.presbyopia){
    haloOpacity = state.scene==='night' ? 0.03 : 0;
    haloBlur = 2;
  }

  const dist = 4 + residual.astigmatism * 20;
  const rad = axis * Math.PI / 180;
  let ghostX = Math.cos(rad) * dist;
  let ghostY = Math.sin(rad) * dist;
  let ghostOpacity = residual.astigmatism ? Math.min(0.55, residual.astigmatism * 0.68) : 0;
  let ghostBlur = 0.7 + residual.astigmatism * 3.3;
  let axisOpacity = residual.astigmatism ? 0.30 : 0;

  if(maxGlow){
    ghostOpacity *= 0.75;
    ghostBlur *= 0.85;
    baseBlur *= 0.88;
    farBlur *= 0.86;
    nearBlur *= 0.86;
  }

  const masks = sceneMasks(state.scene);
  return {
    baseFilter:`blur(${baseBlur.toFixed(2)}px) contrast(${contrast.toFixed(3)}) brightness(${brightness.toFixed(3)}) saturate(${saturate.toFixed(3)})`,
    farFilter:`blur(${farBlur.toFixed(2)}px) contrast(${contrast.toFixed(3)}) brightness(${brightness.toFixed(3)}) saturate(${saturate.toFixed(3)})`,
    nearFilter:`blur(${nearBlur.toFixed(2)}px) contrast(${contrast.toFixed(3)}) brightness(${brightness.toFixed(3)}) saturate(${saturate.toFixed(3)})`,
    farOpacity: farBlur>0.1 ? 1 : 0,
    nearOpacity: nearBlur>0.1 ? 1 : 0,
    ghostOpacity, ghostX:`${ghostX.toFixed(1)}px`, ghostY:`${ghostY.toFixed(1)}px`, ghostBlur:`${ghostBlur.toFixed(2)}px`,
    haloOpacity, haloBlur:`${haloBlur.toFixed(2)}px`, haloBrightness,
    axisOpacity, axisDeg:`${axis}deg`,
    nearMask:masks.nearMask,
    farMask:masks.farMask
  };
}

function applyStyle(stack,effect){
  stack.style.setProperty('--baseFilter', effect.baseFilter);
  stack.style.setProperty('--farFilter', effect.farFilter);
  stack.style.setProperty('--nearFilter', effect.nearFilter);
  stack.style.setProperty('--farOpacity', effect.farOpacity);
  stack.style.setProperty('--nearOpacity', effect.nearOpacity);
  stack.style.setProperty('--ghostOpacity', effect.ghostOpacity);
  stack.style.setProperty('--ghostX', effect.ghostX);
  stack.style.setProperty('--ghostY', effect.ghostY);
  stack.style.setProperty('--ghostBlur', effect.ghostBlur);
  stack.style.setProperty('--haloOpacity', effect.haloOpacity);
  stack.style.setProperty('--haloBlur', effect.haloBlur);
  stack.style.setProperty('--haloBrightness', effect.haloBrightness);
  stack.style.setProperty('--axisOpacity', effect.axisOpacity);
  stack.style.setProperty('--axisDeg', effect.axisDeg);
  stack.style.setProperty('--nearMask', effect.nearMask);
  stack.style.setProperty('--farMask', effect.farMask);
}

function applyVisuals(){
  applyStyle(dom.leftStack, computeEffect(state.leftProduct));
  applyStyle(dom.rightStack, computeEffect(state.rightProduct));
  updateBadges();
}

function productName(id){ const p=allProducts.find(x=>x.id===id); return p ? p.name.replace(' (아무것도 선택 안함)','') : 'None'; }
function updateBadges(){
  const label = conditions.filter(c=>state.selected.includes(c.id)).map(c=>c.label).join(' + ');
  dom.conditionBadge.textContent=`상태 : ${label}`;
  dom.sceneBadge.textContent=`Scene : ${scenes[state.scene].label}`;
}

function setScene(key){
  state.scene=key; dom.sceneSelect.value=key;
  const src=scenes[key].url;
  allVideos.forEach(v=>{ if(v.src!==src){v.src=src; v.load();} v.play().catch(()=>{}); });
  updateBadges(); applyVisuals();
}

function syncVideos(){
  const master=dom.leftBase;
  allVideos.forEach(v=>{
    if(v===master) return;
    if(Math.abs(master.currentTime-v.currentTime)>0.08){ try{v.currentTime=master.currentTime;}catch(e){} }
    if(master.paused && !v.paused) v.pause();
    if(!master.paused && v.paused) v.play().catch(()=>{});
  });
}

function renderAll(){renderConditions(); renderSliders(); renderProducts(); applyVisuals(); updateBadges();}

function setSplit(percent){ state.split=Math.max(15,Math.min(85,percent)); dom.stage.style.setProperty('--split', state.split+'%'); }
setSplit(50);
let dragging=false;
function moveSplit(clientX){ const rect=dom.stage.getBoundingClientRect(); setSplit(((clientX-rect.left)/rect.width)*100); }
dom.handle.addEventListener('pointerdown',e=>{dragging=true; dom.handle.setPointerCapture(e.pointerId);});
dom.handle.addEventListener('pointermove',e=>{if(dragging) moveSplit(e.clientX);});
dom.handle.addEventListener('pointerup',()=>dragging=false);
dom.stage.addEventListener('pointerdown',e=>{ if(e.target===dom.stage || e.target.classList.contains('divider')) moveSplit(e.clientX); });

dom.sceneSelect.onchange=e=>setScene(e.target.value);
dom.resetBtn.onclick=()=>{ state.selected=['emmetrope']; state.severity={myopia:45,hyperopia:45,astigmatism:50,presbyopia:50,axis:14}; state.leftProduct='none'; state.rightProduct='none'; setSplit(50); syncSelectOptions(); renderAll(); };

setInterval(syncVideos,500);
renderAll(); setScene('day');
</script>
